name: xcash-dev

volumes:
  django_db_data: {}
  redis_data: {}
  # anvil 会在 $HOME/.foundry/anvil/tmp 下按会话堆放每块 trace/receipt，独立卷便于排查与单独清理。
  foundry_home: {}

services:
  django-db:
    image: postgres:18.3-trixie
    container_name: xcash_dev_django_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - django_db_data:/var/lib/postgresql

  redis:
    image: redis:8.2.1
    container_name: xcash_dev_redis
    restart: unless-stopped
    # 与生产一致：maxmemory 上限 + volatile-lru（只淘汰带 TTL 的临时缓存，
    # broker 任务键与 timeout=None 配置缓存豁免），让本地也能复现淘汰行为。
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - "256mb"
      - --maxmemory-policy
      - volatile-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  flower:
    image: mher/flower:2.0
    container_name: xcash_dev_flower
    restart: unless-stopped
    depends_on:
       - redis
    environment:
      FLOWER_BROKER_URL: ${FLOWER_BROKER_URL:-redis://redis:6379/0}
      FLOWER_PORT: 5555
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    command:
      - celery
      - --broker=${FLOWER_BROKER_URL:-redis://redis:6379/0}
      - flower
      - --port=5555

  ethereum:
    image: ghcr.io/foundry-rs/foundry:v1.3.1
    container_name: xcash_dev_ethereum
    # 开发环境直接以 root 运行，避免 Docker 命名卷根目录默认 755/root:root
    # 导致镜像内 foundry 用户无法写入挂载点。
    user: "0:0"
    restart: unless-stopped
    entrypoint: ["anvil"]
    ports:
      - "${LOCAL_EVM_PORT:-8545}:8545"
    volumes:
      # anvil 会在 $HOME/.foundry/anvil/tmp/<session> 下累积每块 trace/receipt，并仅在 graceful shutdown 时清理。
      # 容器异常重启会留下数十 GB 孤儿目录。挂出独立卷避免污染容器可写层，便于按需 docker volume rm 清理。
      - foundry_home:/root/.foundry
    # anvil 的 stdout 每秒至少一行块日志，限制 daemon 端日志体积，避免长跑后吃满宿主机磁盘。
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8545"
      - --chain-id
      - "${LOCAL_EVM_CHAIN_ID:-31337}"
      # 每秒自动出块，模拟真实链的区块推进，使 FULL 确认模式和 block_number_updated 正常工作。
      - --block-time
      - "${LOCAL_EVM_BLOCK_TIME:-1}"
      # dev 不持久化链状态：anvil 的 --state 单文件 + 周期落盘并非原子写，被强杀会留下截断 JSON 致下次启动反复崩溃。
      # 每次容器重启都从创世块开始，业务侧不应依赖历史余额/nonce/合约地址。
      # 仅保留最近 N 块的 trace/receipt/log，避免 anvil 在 $HOME/.foundry 无限累积历史。
      # 1s 出块下 10000 块 ≈ 2.8h 历史，覆盖典型 dev 调试场景。
      - --prune-history
      - "10000"

  # Go signer 在 dev 下不进容器：用 `make dev-up-signer`（scripts/dev-signer.sh，go run）
  # 在宿主本地运行，监听 :8010，SQLite 落本地文件。无独立 signer 数据库。
