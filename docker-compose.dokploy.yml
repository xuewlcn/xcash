# ==========================================================
# Xcash - Dokploy Production Compose
#
# 与官方 docker-compose.yml 分离
#
# 调整内容：
# 1. 删除 PostgreSQL 容器
# 2. 删除 Redis 容器
# 3. 使用 1Panel 已有 PostgreSQL / Redis
# 4. 保留 Caddy 作为静态文件服务器 + Django Proxy
# 5. 入口交给 Dokploy Traefik
#
# ==========================================================


services:


  # ========================================================
  # Django Web Application
  #
  # 网络：
  #
  # default:
  #   Xcash 内部通信
  #
  # xcash_public:
  #   Caddy -> Django
  #
  # 1panel-network:
  #   PostgreSQL / Redis
  #
  # ========================================================

  django:

    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile
      target: python-run-stage


    restart: unless-stopped


    env_file:
      - .env


    networks:
      - default
      - xcash_public
      - 1panel-network


    command: /start


    expose:
      - "8000"



  # ========================================================
  # Celery Worker
  #
  # 网络：
  #
  # default:
  #   内部任务通信
  #
  # 1panel-network:
  #   Redis / PostgreSQL
  #
  # ========================================================

  worker:

    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile
      target: python-run-stage


    restart: unless-stopped


    env_file:
      - .env


    networks:
      - default
      - 1panel-network


    command: /start-worker



  # ========================================================
  # Celery Beat
  #
  # ========================================================

  beat:

    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile
      target: python-run-stage


    restart: unless-stopped


    env_file:
      - .env


    networks:
      - default
      - 1panel-network


    command: /start-beat



  # ========================================================
  # Caddy
  #
  # 作用：
  #
  # 1. 静态文件服务
  # 2. Django 反向代理
  #
  #
  # 网络：
  #
  # dokploy-network:
  #   Traefik -> Caddy
  #
  # xcash_public:
  #   Caddy -> Django
  #
  # default:
  #   保持官方结构
  #
  # ========================================================

  caddy:


    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile
      target: caddy-run-stage


    restart: unless-stopped


    depends_on:

      - django



    networks:

      - default

      - dokploy-network

      xcash_public:
        aliases:
          - xcash-caddy



    expose:

      - "80"



# ==========================================================
# Networks
#
# ==========================================================

networks:


  # ========================================================
  # Compose Default Network
  #
  # 保持官方 Xcash 行为
  #
  # ========================================================

  default:



  # ========================================================
  # Dokploy Traefik Network
  #
  # Traefik -> Caddy
  #
  # 已由 Dokploy 创建
  #
  # ========================================================

  dokploy-network:

    external: true



  # ========================================================
  # Xcash Public Network
  #
  # Caddy -> Django
  #
  # 保持官方设计
  #
  # ========================================================

  xcash_public:

    name: xcash_public



  # ========================================================
  # 1Panel Network
  #
  # Django / Worker / Beat
  #
  # -> PostgreSQL / Redis
  #
  # 已由 1Panel 创建
  #
  # ========================================================

  1panel-network:

    external: true



# ==========================================================
# 注意：
#
# 不定义：
#
# postgres
# redis
#
# 因为使用服务器已有服务
#
# ==========================================================
