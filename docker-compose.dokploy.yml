# ==========================================================
# Xcash - Dokploy Production Compose
#
# PostgreSQL 使用 1Panel 已有服务。
# Redis 由本 Compose 独立运行，仅供 Xcash 使用。
# Caddy 作为静态文件服务器和 Django 反向代理，
# 公网入口由 Dokploy Traefik 提供。
# ==========================================================

volumes:
  redis_data: {}

networks:
  default:

  # 同机可信服务可通过 xcash-caddy 访问 Xcash。
  xcash_public:
    name: xcash_public

  # Django / Worker / Beat 通过此网络连接 1Panel PostgreSQL。
  1panel-network:
    external: true

  # Dokploy Traefik 通过此网络连接 Caddy。
  dokploy-network:
    external: true

services:
  # 不发布端口、不加入外部网络，因此无需为这个 Redis 设置密码。
  xcash-redis:
    image: redis:8.2.1
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - "256mb"
      - --maxmemory-policy
      - volatile-lru
    volumes:
      - redis_data:/data
    networks:
      - default
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  django:
    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile
      target: python-run-stage
    restart: unless-stopped
    depends_on:
      xcash-redis:
        condition: service_healthy
    env_file:
      - .env
    # 显式覆盖 .env/Dokploy 中可能残留的外部 Redis 配置。
    environment:
      REDIS_HOST: xcash-redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_CACHE_DB: "1"
      REDIS_URL: redis://xcash-redis:6379/0
      REDIS_CACHE_URL: redis://xcash-redis:6379/1
    networks:
      - default
      - xcash_public
      - 1panel-network
    command: /start
    expose:
      - "8000"

  worker:
    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile
      target: python-run-stage
    restart: unless-stopped
    depends_on:
      xcash-redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_HOST: xcash-redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_CACHE_DB: "1"
      REDIS_URL: redis://xcash-redis:6379/0
      REDIS_CACHE_URL: redis://xcash-redis:6379/1
    networks:
      - default
      - 1panel-network
    command: /start-worker

  beat:
    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile
      target: python-run-stage
    restart: unless-stopped
    depends_on:
      xcash-redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_HOST: xcash-redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_CACHE_DB: "1"
      REDIS_URL: redis://xcash-redis:6379/0
      REDIS_CACHE_URL: redis://xcash-redis:6379/1
    networks:
      - default
      - 1panel-network
    command: /start-beat

  caddy:
    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile
      target: caddy-run-stage
    restart: unless-stopped
    depends_on:
      - django
    networks:
      default:
      dokploy-network:
      xcash_public:
        aliases:
          - xcash-caddy
    expose:
      - "80"
