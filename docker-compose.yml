name: xcash

volumes:
  redis_data: {}
  django_db_data: {}
  signer_data: {}
  django_staticfiles: {}

# 同机 SaaS 等可信服务通过加入 xcash_public 按 DNS 别名互通（如 http://xcash-caddy）。
# xcash 自己总是创建该网络；即便没有外部服务加入也不影响本项目正常运行。
networks:
  default:
  xcash_public:
    name: xcash_public

services:
  redis:
    image: redis:8.2.1
    container_name: xcash_redis
    restart: unless-stopped
    # maxmemory 给缓存 + broker 共用实例设上限，避免无限增长打爆主机；
    # volatile-lru 只淘汰带 TTL 的临时缓存键，broker 任务键与 timeout=None 的
    # 配置缓存（无 TTL）永不被淘汰，保证任务不丢、配置缓存常驻。
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - "256mb"
      - --maxmemory-policy
      - volatile-lru
    volumes:
      - redis_data:/data

  django-db:
    image: postgres:18.3-trixie
    container_name: xcash_django_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: xcash
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - django_db_data:/var/lib/postgresql

  migration-rehearsal-db:
    image: postgres:18.3-trixie
    container_name: xcash_migration_rehearsal_db
    profiles: ["migration-rehearsal"]
    environment:
      POSTGRES_DB: xcash
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  signer:
    build:
      context: ./signer
      dockerfile: Dockerfile
    container_name: xcash_signer
    restart: unless-stopped
    # signer 专属密钥文件（含助记词解密密钥），主应用容器不加载。
    env_file:
      - ${SIGNER_ENV_FILE:-.env.signer}
    # Go + SQLite 单实例托管者：无 PG、无 Redis 依赖，状态全在挂载卷里的 sqlite 文件。
    networks: [default]
    volumes:
      - signer_data:/data

  django: &django
    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile
    container_name: xcash_django
    restart: unless-stopped
    depends_on:
      - django-db
      - redis
      - signer
    # 主环境文件：刻意【不含】signer 助记词解密密钥（仅在 .env.signer）。
    # 含 SIGNER_SHARED_SECRET（调 signer 的 HMAC）。worker/beat 经 anchor 继承。
    env_file:
      - ${ENV_FILE:-.env}
    # django/worker/beat 都需要按 DNS 别名解析 saas 侧 Caddy：
    # django 同步校验 SaaS permission，worker 推送内部回调，beat 调度刷新任务。
    networks: [default, xcash_public]
    volumes:
      - django_staticfiles:/app/staticfiles
    command: /start

  worker:
    <<: *django
    container_name: xcash_worker
    environment:
      REMAP_SIGTERM: SIGQUIT
    stop_grace_period: 60s
    command: /start-worker

  beat:
    <<: *django
    container_name: xcash_beat
    command: /start-beat

  caddy:
    image: caddy:2.11.2-alpine
    container_name: xcash_caddy
    restart: unless-stopped
    depends_on:
      - django
    ports:
      - "${LISTEN_TO:-127.0.0.1}:6688:80"
    # 对外（公网）走端口映射，对内（SaaS 同机调用）通过 xcash_public 网络按 DNS 别名直连。
    networks:
      default: {}
      xcash_public:
        aliases:
          - xcash-caddy
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - django_staticfiles:/srv/staticfiles:ro
