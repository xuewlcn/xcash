name: xcash

volumes:
  redis_data: {}
  django_db_data: {}
  signer_db_data: {}
  django_staticfiles: {}

# 同机 SaaS 等可信服务通过加入 xcash_public 按 DNS 别名互通（如 http://xcash-caddy）。
# xcash 自己总是创建该网络；即便没有外部服务加入也不影响本项目正常运行。
networks:
  default:
  xcash_public:
    name: xcash_public

services:
  redis:
    image: redis:8.2.1
    container_name: xcash_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  django-db:
    image: postgres:18.3-trixie
    container_name: xcash_django_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: xcash
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - django_db_data:/var/lib/postgresql

  signer-db:
    image: postgres:18.3-trixie
    container_name: xcash_signer_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: xcash_signer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${SIGNER_POSTGRES_PASSWORD}
    volumes:
      - signer_db_data:/var/lib/postgresql

  migration-rehearsal-db:
    image: postgres:18.3-trixie
    container_name: xcash_migration_rehearsal_db
    profiles: ["migration-rehearsal"]
    environment:
      POSTGRES_DB: xcash
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  migration-rehearsal-signer-db:
    image: postgres:18.3-trixie
    container_name: xcash_migration_rehearsal_signer_db
    profiles: ["migration-rehearsal"]
    environment:
      POSTGRES_DB: xcash_signer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${SIGNER_POSTGRES_PASSWORD}

  signer:
    build:
      context: .
      dockerfile: ./signer/compose/production/Dockerfile
    container_name: xcash_signer
    restart: unless-stopped
    depends_on:
      - signer-db
      - redis
    env_file:
      - ${ENV_FILE:-.env}
    command: /start

  django: &django
    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile
    container_name: xcash_django
    restart: unless-stopped
    depends_on:
      - django-db
      - redis
      - signer
    env_file:
      - ${ENV_FILE:-.env}
    # django/worker/beat 都需要按 DNS 别名解析 saas 侧 Caddy：
    # django 同步校验 SaaS permission，worker 推送内部回调，beat 调度刷新任务。
    networks: [default, xcash_public]
    volumes:
      - django_staticfiles:/app/staticfiles
    command: /start

  worker:
    <<: *django
    container_name: xcash_worker
    environment:
      REMAP_SIGTERM: SIGQUIT
    stop_grace_period: 60s
    command: /start-worker

  beat:
    <<: *django
    container_name: xcash_beat
    command: /start-beat

  caddy:
    image: caddy:2.11.2-alpine
    container_name: xcash_caddy
    restart: unless-stopped
    depends_on:
      - django
    ports:
      - "${LISTEN_TO:-127.0.0.1}:6688:80"
    # 对外（公网）走端口映射，对内（SaaS 同机调用）通过 xcash_public 网络按 DNS 别名直连。
    networks:
      default: {}
      xcash_public:
        aliases:
          - xcash-caddy
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - django_staticfiles:/srv/staticfiles:ro
